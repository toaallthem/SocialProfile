<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintengu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ink-overlay"></div>

<div class="brush-bg"></div>

<div class="scroll-container">
    <div class="grain-texture"></div>
    
    <div class="sakura-rain">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
    </div>

    <div class="enso-symbol"></div>
    
    <div class="tech-seals">
        <div class="seal js">JS</div>
        <div class="seal py">PY</div>
        <div class="seal html">HT</div>
        <div class="seal css">C3</div>
    </div>

    <div class="scroll-content">
        <div class="frame-avatar">
            <img id="profile" src="profile.gif" alt="Nintengu">
        </div>
        
        <h1 class="calligraphy-name">Nintengu</h1>
        
        <div class="spirit-status">
            <span class="ink-dot"></span> 
            ONLINE
        </div>

        <p class="philosophy">
            "Teria eu a preguiça,<br>ou seria eu o preguiçoso?"
        </p>

        <div class="discord-tag">
            <span class="brush-mark"></span>
            <span class="user-text">@toaallthem</span>
        </div>

        <div class="hanko-seal">天狗</div>
    </div>

    <svg class="sumi-wave" viewBox="0 0 400 120" preserveAspectRatio="none">
        <path d="M0,100 Q50,50 100,100 T200,100 T300,100 T400,100 L400,120 L0,120 Z" fill="#1a1a1a">
            <animate attributeName="d" dur="6s" repeatCount="indefinite"
                values="M0,100 Q50,50 100,100 T200,100 T300,100 T400,100 L400,120 L0,120 Z;
                        M0,100 Q50,80 100,100 T200,100 T300,80 T400,100 L400,120 L0,120 Z;
                        M0,100 Q50,50 100,100 T200,100 T300,100 T400,100 L400,120 L0,120 Z" />
        </path>
    </svg>
</div>

<svg style="position: absolute; width: 0; height: 0;">
    <filter id="ink-filter">
        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="4" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="60" />
    </filter>
</svg>

</body>
</html>
